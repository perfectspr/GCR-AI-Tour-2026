name: Daily Podcast Generator

on:
  schedule:
    # 每天 UTC 时间 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Azure credentials
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          # Debug: Check if AZURE_CREDENTIALS is set
          echo "AZURE_CREDENTIALS length: ${#AZURE_CREDENTIALS}"
          echo "AZURE_CREDENTIALS content: $AZURE_CREDENTIALS"
          
          # Extract credentials from JSON and set as environment variables
          echo "AZURE_CLIENT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientId')" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientSecret')" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.tenantId')" >> $GITHUB_ENV
          echo "AZURE_SUBSCRIPTION_ID=$(echo "$AZURE_CREDENTIALS" | jq -r '.subscriptionId')" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get topic from title.txt
        id: get-topic
        run: |
          # 读取第一行主题
          TOPIC=$(head -n 1 topic/title.txt)
          
          if [ -z "$TOPIC" ]; then
            echo "Error: No topic found in title.txt"
            exit 1
          fi
          
          echo "Selected topic: $TOPIC"
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          
          # 删除已使用的第一行，保留其余行
          tail -n +2 topic/title.txt > topic/title.txt.tmp
          mv topic/title.txt.tmp topic/title.txt
          
          # 如果文件为空，添加提示信息
          if [ ! -s topic/title.txt ]; then
            echo "# 所有主题已处理完毕，请添加新的主题" > topic/title.txt
          fi

      - name: Run podcast workflow
        run: |
          python podcast_workflow.py -t "${{ steps.get-topic.outputs.topic }}"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加所有变更（包括生成的 podcast 文件和更新的 title.txt）
          git add .
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎙️ Generate podcast for: ${{ steps.get-topic.outputs.topic }}"
            git push
          fi
